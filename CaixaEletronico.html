<html>

<head>

	<script>
		var nome = prompt("Informe seu nome: ")
		alert("Olá " + nome + ", é um prazer ter você por aqui!");// função nova


		var saldo = 100.5; //Float
		var extrato = [];

		function inicio() {

			var escolha = parseInt(prompt('Selecione uma opção\n1.) Saldo\n2.) Extrato\n3.) Saque\n4.) Depósito\n5.) Tranferência\n6.) Sair'));
			//"\n" serve para pular uma linha fazendo assim o menu ficar com cara de menu
			switch(escolha){
				case 1:
					if(pedir_senha()) ver_saldo();
					break;

				case 2:
					if(pedir_senha()) ver_extrato(); // nova função adcionada
					break;


				case 3:
					if(pedir_senha()) fazer_saque();
					break;

				case 4:
					if(pedir_senha()) fazer_deposito();
					break;


				case 5:
					if(pedir_senha()) fazer_transferencia();
					break;

				case 6:
					sair();
					break;

				default:
					erro();
			}
		}		

		function pedir_senha(){
			var senha = prompt("Informe sua senha: ");

			if(senha != "3589"){
				alert("Senha incorreta! ");
				inicio();
				return false;
			}
			return true;
		}

		function ver_saldo() {
			alert('Seu saldo atual é: ' + saldo);
			inicio();
		}

		function ver_extrato(){
			alert("Extrato:\n" + extrato.join("\n")); // nova função adcionada
			inicio();
		}

		function fazer_deposito() {
			var deposito = parseFloat(prompt('Qual o valor para depósito?'));
			// Not a Number
			if (isNaN(deposito) || deposito <= 0) {
				alert('Por favor, informe um número:');
				fazer_deposito();
			} else {
				saldo += deposito;
				extrato.push("Depósito: +" + deposito);//o push é um array para guardar as informações no extrato
				ver_saldo();
			}
		}

		function fazer_saque() {
			var saque = parseFloat(prompt('Qual o valor para saque?'));

			if (isNaN(saque) || saque === '') {
				alert('Por favor, informe um número:');
				fazer_saque();

			} else if (saque > saldo || saque <= 0){
				alert("Operação não Autorizada");
				fazer_saque();
			} else{
				saldo -= saque;
				extrato.push("Saque: -" + saque); //array push para puxar a informação para o extrato
				ver_saldo();
			}
		}

		function erro() {
			alert('Por favor, informe um número entre 1 a 6');
			inicio();
		}

		function fazer_transferencia(){
			var conta = prompt("Informe o número da conta destinatária: ");
			
			if(isNaN(valor)){
				alert("Conta invalida ou não reconhecida!");
				inicio();
				return;
			}

			var valor = parseFloat(prompt("Qual o valor da Transferência?"));

			if(isNaN(valor) || valor <= 0 || valor > saldo){ //verifica se o valor a ser transferido ta denton do saldo
				alert("Operação não autorizada");
				inicio();
				return;
			}

			saldo -= valor;
			extrato.push("Tranferência: -" + valor + "para conta "+ conta); // push pois esse dado vai para o extrato

			alert("Tranferência realizada com sucesso");
			inicio();
			
		}

		function sair() {
			var confirma = confirm('Você deseja sair?');
			if (confirma) {
				alert(nome + ", foi um prazer ter você por aqui!");
				window.close();
			} else {
				inicio();
			}
		}

		
		
		inicio();
	</script>
</head>
