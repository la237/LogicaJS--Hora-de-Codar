<!--EXERCICIO 11-->
<script>

var n = Number(prompt("Digite até qual tabuada deseja"));

var i = 1;

while(i <= n){

    document.write("<br>Tabuada do " + i + "<br>");

    var j = 1;

    while(j <= 10){
        document.write(i + " x " + j + " = " + (i*j) + "<br>");
        j = j + 1;
    }

    i = i + 1;
}

</script>
