    <!--EXERCICIO 4
    <script>
    var a = Number(prompt("Digite o primeiro número"));
    var b = Number(prompt("Digite o segundo número"));
    var c = Number(prompt("Digite o terceiro número"));

    if(a > b && a > c){
        alert("Soma dos dois maiores: " + (a + (b > c ? b : c)));
    }
    else if(b > a && b > c){
        alert("Soma dos dois maiores: " + (b + (a > c ? a : c)));
    }
    else{
        alert("Soma dos dois maiores: " + (c + (a > b ? a : b)));
    }
    </script>-->

    <!--EXERCICIO 11-->
    <script>
    var a = Number(prompt("Digite o primeiro número"));

    if(op == 1){
        alert(a + b);
    }
    else if(op == 2){
        alert(a - b);
    }
    else if(op == 3){
        alert(a / b);
    }
    else{
        alert(a * b);
    }
