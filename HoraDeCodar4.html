<!--EXERCICIO 3-->
<script>

var frutas = ["Maçã", "Banana", "Uva", "Laranja"];

while(frutas.length > 0){

    alert("Frutas: " + frutas);

    var fruta = prompt("Digite uma fruta para retirar");

    if(frutas.includes(fruta)){

        var pos = frutas.indexOf(fruta);
        frutas.splice(pos, 1);

        alert("Fruta retirada");

    }
    else{
        alert("Fruta indisponível");
    }
}

alert("Lista de compras finalizada");

</script>
